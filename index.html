<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Seed Note</title>
  <script src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.23.6/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif; background: #f5f7fa; color: #1a1a2e; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-thumb { background: #c0cce0; border-radius: 3px; }

    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner { width: 32px; height: 32px; border: 3px solid #e0e7ff; border-top-color: #4f6ef7; border-radius: 50%; animation: spin 0.7s linear infinite; margin: auto; }

    .app-root { min-height: 100vh; display: flex; flex-direction: column; }

    /* Header */
    .header {
      background: #1a1a2e;
      color: #fff;
      padding: 0 20px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }
    .header-logo { font-size: 18px; font-weight: 700; letter-spacing: 0.04em; color: #a0b4ff; }
    .header-logo span { color: #fff; }
    .header-badge {
      font-size: 11px;
      background: #2d3a6e;
      padding: 3px 10px;
      border-radius: 20px;
      color: #a0b4ff;
    }
    .header-user {
      font-size: 13px;
      color: #8899cc;
      cursor: pointer;
    }
    .header-user:hover { color: #fff; }

    /* Login */
    .login-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 60%, #0f3460 100%);
    }
    .login-card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(160,180,255,0.15);
      border-radius: 16px;
      padding: 40px 36px;
      width: 340px;
      backdrop-filter: blur(12px);
    }
    .login-title { text-align: center; color: #a0b4ff; font-size: 22px; font-weight: 700; margin-bottom: 8px; }
    .login-sub { text-align: center; color: #556; font-size: 13px; margin-bottom: 28px; }
    .login-label { display: block; color: #8899cc; font-size: 12px; margin-bottom: 6px; margin-top: 16px; }
    .login-input {
      width: 100%;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(160,180,255,0.2);
      border-radius: 8px;
      padding: 10px 14px;
      color: #e0e8ff;
      font-size: 14px;
      outline: none;
    }
    .login-input:focus { border-color: #4f6ef7; }
    .login-btn {
      width: 100%;
      margin-top: 24px;
      padding: 12px;
      background: #4f6ef7;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    .login-btn:hover:not(:disabled) { background: #3a56e0; }
    .login-btn:disabled { opacity: 0.5; cursor: default; }
    .login-err { color: #ff7070; font-size: 13px; margin-top: 12px; text-align: center; }

    /* Layout */
    .main-layout { display: flex; flex: 1; }
    .sidebar {
      width: 220px;
      min-height: calc(100vh - 56px);
      background: #fff;
      border-right: 1px solid #e8edf5;
      padding: 16px 0;
      flex-shrink: 0;
    }
    .sidebar-section { padding: 8px 16px 4px; font-size: 10px; font-weight: 700; color: #99a; letter-spacing: 0.08em; text-transform: uppercase; }
    .sidebar-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 20px;
      font-size: 14px;
      color: #445;
      cursor: pointer;
      transition: background 0.1s;
      border-left: 3px solid transparent;
    }
    .sidebar-item:hover { background: #f0f4ff; color: #4f6ef7; }
    .sidebar-item.active { background: #f0f4ff; color: #4f6ef7; border-left-color: #4f6ef7; font-weight: 600; }
    .sidebar-icon { font-size: 16px; width: 20px; text-align: center; }

    .content { flex: 1; padding: 24px; overflow-y: auto; }

    /* Cards */
    .stat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 16px; margin-bottom: 28px; }
    .stat-card {
      background: #fff;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07);
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .stat-label { font-size: 12px; color: #778; font-weight: 600; }
    .stat-value { font-size: 28px; font-weight: 700; color: #1a1a2e; }
    .stat-sub { font-size: 12px; color: #aab; }

    .section-title { font-size: 16px; font-weight: 700; color: #1a1a2e; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }

    .table-wrap {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07);
      overflow: hidden;
      margin-bottom: 28px;
    }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { background: #f8faff; padding: 10px 16px; text-align: left; font-size: 11px; font-weight: 700; color: #778; letter-spacing: 0.05em; border-bottom: 1px solid #eef0f8; }
    td { padding: 10px 16px; border-bottom: 1px solid #f0f4f8; color: #334; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #f8faff; }

    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 11px;
      font-weight: 600;
    }
    .badge-blue { background: #e0e7ff; color: #4f6ef7; }
    .badge-green { background: #d1fae5; color: #059669; }
    .badge-yellow { background: #fef3c7; color: #d97706; }
    .badge-red { background: #fee2e2; color: #dc2626; }
    .badge-gray { background: #f1f5f9; color: #64748b; }

    .empty-state { text-align: center; padding: 40px; color: #aab; font-size: 14px; }

    .page-title { font-size: 20px; font-weight: 700; color: #1a1a2e; margin-bottom: 20px; }

    .search-bar {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
    }
    .search-input {
      flex: 1;
      border: 1px solid #dde3f0;
      border-radius: 8px;
      padding: 8px 14px;
      font-size: 14px;
      outline: none;
      background: #fff;
    }
    .search-input:focus { border-color: #4f6ef7; }

    .btn {
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: background 0.15s;
    }
    .btn-primary { background: #4f6ef7; color: #fff; }
    .btn-primary:hover { background: #3a56e0; }
    .btn-outline { background: #fff; color: #4f6ef7; border: 1px solid #4f6ef7; }
    .btn-outline:hover { background: #f0f4ff; }

    .status-ok { color: #059669; font-size: 12px; }
    .status-err { color: #dc2626; font-size: 12px; }

    @media (max-width: 640px) {
      .sidebar { display: none; }
      .content { padding: 16px; }
      .stat-grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/jsx-source" id="app-jsx">
const SUPABASE_URL      = 'https://wxjmqrxaqrujsvgzknwy.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_JYkjSrSixBp9jquMeq6hKw_YMwwiDSx';
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const { useState, useEffect, useCallback } = React;

// ─── Status badge ──────────────────────────────────────────────
function StatusBadge({ status }) {
  const map = {
    '調整中':         'badge-yellow',
    '日程確定':       'badge-blue',
    '完了':           'badge-green',
    'キャンセル':     'badge-red',
    '日程相談中':     'badge-yellow',
    '日程変更相談中': 'badge-yellow',
    'キャンセル相談中': 'badge-red',
  };
  return <span className={`badge ${map[status] || 'badge-gray'}`}>{status || '-'}</span>;
}

// ─── Dashboard ─────────────────────────────────────────────────
function Dashboard({ companies, sites, orders }) {
  const active = orders.filter(o => o.status !== '完了' && o.status !== 'キャンセル');
  const done   = orders.filter(o => o.status === '完了');
  const recent = [...orders].sort((a,b) => new Date(b.created_at)-new Date(a.created_at)).slice(0,5);

  return (
    <div>
      <div className="page-title">ダッシュボード</div>
      <div className="stat-grid">
        <div className="stat-card">
          <div className="stat-label">顧客数</div>
          <div className="stat-value">{companies.length}</div>
          <div className="stat-sub">companies</div>
        </div>
        <div className="stat-card">
          <div className="stat-label">現場数</div>
          <div className="stat-value">{sites.length}</div>
          <div className="stat-sub">sites</div>
        </div>
        <div className="stat-card">
          <div className="stat-label">発注総数</div>
          <div className="stat-value">{orders.length}</div>
          <div className="stat-sub">orders</div>
        </div>
        <div className="stat-card">
          <div className="stat-label">進行中</div>
          <div className="stat-value" style={{color:'#4f6ef7'}}>{active.length}</div>
          <div className="stat-sub">進行中の案件</div>
        </div>
        <div className="stat-card">
          <div className="stat-label">完了</div>
          <div className="stat-value" style={{color:'#059669'}}>{done.length}</div>
          <div className="stat-sub">完了済み案件</div>
        </div>
      </div>

      <div className="section-title">最近の発注</div>
      <div className="table-wrap">
        {recent.length === 0 ? (
          <div className="empty-state">データがありません</div>
        ) : (
          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>サービス</th>
                <th>現場</th>
                <th>ステータス</th>
                <th>作成日</th>
              </tr>
            </thead>
            <tbody>
              {recent.map(o => (
                <tr key={o.id}>
                  <td style={{fontFamily:'monospace',fontSize:12}}>{o.id}</td>
                  <td>{o.service || '-'}</td>
                  <td>{o.site || '-'}</td>
                  <td><StatusBadge status={o.status} /></td>
                  <td style={{color:'#889',fontSize:12}}>{o.created_at ? o.created_at.slice(0,10) : '-'}</td>
                </tr>
              ))}
            </tbody>
          </table>
        )}
      </div>
    </div>
  );
}

// ─── Companies page ────────────────────────────────────────────
function CompaniesPage({ companies }) {
  const [q, setQ] = useState('');
  const filtered = companies.filter(c =>
    !q || (c.name||'').includes(q) || (c.company_id||'').includes(q)
  );
  return (
    <div>
      <div className="page-title">顧客マスタ</div>
      <div className="search-bar">
        <input className="search-input" placeholder="会社名・コードで検索" value={q} onChange={e=>setQ(e.target.value)} />
      </div>
      <div className="table-wrap">
        {filtered.length === 0 ? (
          <div className="empty-state">データがありません</div>
        ) : (
          <table>
            <thead>
              <tr>
                <th>企業コード</th>
                <th>会社名</th>
                <th>担当者</th>
                <th>電話</th>
                <th>メール</th>
                <th>有効</th>
              </tr>
            </thead>
            <tbody>
              {filtered.map(c => (
                <tr key={c.id}>
                  <td style={{fontFamily:'monospace',fontSize:12}}>{c.company_id || c.id?.slice(0,8)}</td>
                  <td style={{fontWeight:600}}>{c.name || '-'}</td>
                  <td>{c.contact_name || '-'}</td>
                  <td>{c.phone || '-'}</td>
                  <td>{c.email || '-'}</td>
                  <td>
                    {c.is_active !== false
                      ? <span className="badge badge-green">有効</span>
                      : <span className="badge badge-gray">無効</span>}
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        )}
      </div>
    </div>
  );
}

// ─── Sites page ────────────────────────────────────────────────
function SitesPage({ sites }) {
  const [q, setQ] = useState('');
  const filtered = sites.filter(s =>
    !q || (s.name||'').includes(q) || (s.address||'').includes(q)
  );
  return (
    <div>
      <div className="page-title">現場マスタ</div>
      <div className="search-bar">
        <input className="search-input" placeholder="現場名・住所で検索" value={q} onChange={e=>setQ(e.target.value)} />
      </div>
      <div className="table-wrap">
        {filtered.length === 0 ? (
          <div className="empty-state">データがありません</div>
        ) : (
          <table>
            <thead>
              <tr>
                <th>現場名</th>
                <th>住所</th>
                <th>郵便番号</th>
                <th>鍵</th>
                <th>駐車場</th>
                <th>メモ</th>
              </tr>
            </thead>
            <tbody>
              {filtered.map(s => (
                <tr key={s.id}>
                  <td style={{fontWeight:600}}>{s.name || '-'}</td>
                  <td>{s.address || '-'}</td>
                  <td>{s.zip_code || '-'}</td>
                  <td style={{fontSize:12}}>{s.key_info || '-'}</td>
                  <td style={{fontSize:12}}>{s.parking_info || '-'}</td>
                  <td style={{fontSize:12,color:'#889'}}>{s.memo ? s.memo.slice(0,30)+(s.memo.length>30?'…':'') : '-'}</td>
                </tr>
              ))}
            </tbody>
          </table>
        )}
      </div>
    </div>
  );
}

// ─── Orders page ───────────────────────────────────────────────
function OrdersPage({ orders }) {
  const [q, setQ] = useState('');
  const [statusFilter, setStatusFilter] = useState('');
  const statuses = [...new Set(orders.map(o=>o.status).filter(Boolean))];
  const filtered = orders.filter(o =>
    (!q || (o.id||'').includes(q) || (o.service||'').includes(q) || (o.site||'').includes(q)) &&
    (!statusFilter || o.status === statusFilter)
  );
  return (
    <div>
      <div className="page-title">発注一覧</div>
      <div className="search-bar">
        <input className="search-input" placeholder="ID・サービス・現場で検索" value={q} onChange={e=>setQ(e.target.value)} />
        <select className="search-input" style={{flex:'0 0 140px'}} value={statusFilter} onChange={e=>setStatusFilter(e.target.value)}>
          <option value="">すべて</option>
          {statuses.map(s => <option key={s} value={s}>{s}</option>)}
        </select>
      </div>
      <div className="table-wrap">
        {filtered.length === 0 ? (
          <div className="empty-state">データがありません</div>
        ) : (
          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>サービス</th>
                <th>現場</th>
                <th>住所</th>
                <th>ステータス</th>
                <th>作成日</th>
              </tr>
            </thead>
            <tbody>
              {filtered.map(o => (
                <tr key={o.id}>
                  <td style={{fontFamily:'monospace',fontSize:12}}>{o.id}</td>
                  <td>{o.service || '-'}</td>
                  <td>{o.site || '-'}</td>
                  <td style={{fontSize:12,color:'#667'}}>{o.address || '-'}</td>
                  <td><StatusBadge status={o.status} /></td>
                  <td style={{color:'#889',fontSize:12}}>{o.created_at ? o.created_at.slice(0,10) : '-'}</td>
                </tr>
              ))}
            </tbody>
          </table>
        )}
      </div>
    </div>
  );
}

// ─── Connection check ──────────────────────────────────────────
function ConnectionCheck({ dbStatus }) {
  return (
    <div>
      <div className="page-title">接続確認</div>
      <div className="table-wrap">
        <table>
          <thead>
            <tr><th>テーブル</th><th>ステータス</th><th>件数</th></tr>
          </thead>
          <tbody>
            {Object.entries(dbStatus).map(([table, info]) => (
              <tr key={table}>
                <td style={{fontFamily:'monospace'}}>{table}</td>
                <td>
                  {info.loading ? (
                    <span style={{color:'#aab',fontSize:12}}>確認中...</span>
                  ) : info.error ? (
                    <span className="status-err">エラー: {info.error}</span>
                  ) : (
                    <span className="status-ok">OK</span>
                  )}
                </td>
                <td>{info.count != null ? `${info.count}件` : '-'}</td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
      <div style={{color:'#889',fontSize:12,marginTop:8}}>
        Supabase URL: <code style={{fontSize:11}}>{SUPABASE_URL}</code>
      </div>
    </div>
  );
}

// ─── Login ─────────────────────────────────────────────────────
function Login({ onLogin }) {
  const [email, setEmail]     = useState('');
  const [password, setPassword] = useState('');
  const [loading, setLoading] = useState(false);
  const [err, setErr]         = useState('');

  const handleLogin = async () => {
    setLoading(true); setErr('');
    const { data, error } = await sb.auth.signInWithPassword({ email, password });
    setLoading(false);
    if (error) { setErr(error.message); return; }
    onLogin(data.user);
  };

  return (
    <div className="login-wrap">
      <div className="login-card">
        <div className="login-title">Seed Note</div>
        <div className="login-sub">管理ダッシュボード</div>
        <label className="login-label">メールアドレス</label>
        <input
          className="login-input"
          type="email"
          value={email}
          onChange={e=>setEmail(e.target.value)}
          onKeyDown={e=>e.key==='Enter'&&handleLogin()}
          autoComplete="email"
        />
        <label className="login-label">パスワード</label>
        <input
          className="login-input"
          type="password"
          value={password}
          onChange={e=>setPassword(e.target.value)}
          onKeyDown={e=>e.key==='Enter'&&handleLogin()}
          autoComplete="current-password"
        />
        <button className="login-btn" onClick={handleLogin} disabled={loading||!email||!password}>
          {loading ? '...' : 'ログイン'}
        </button>
        {err && <div className="login-err">{err}</div>}
      </div>
    </div>
  );
}

// ─── Main App ──────────────────────────────────────────────────
function App() {
  const [user, setUser]           = useState(null);
  const [authLoading, setAuthLoading] = useState(true);
  const [page, setPage]           = useState('dashboard');
  const [companies, setCompanies] = useState([]);
  const [sites, setSites]         = useState([]);
  const [orders, setOrders]       = useState([]);
  const [dataLoaded, setDataLoaded] = useState(false);
  const [dbStatus, setDbStatus]   = useState({
    companies: { loading: true },
    sites:     { loading: true },
    orders:    { loading: true },
  });

  useEffect(() => {
    sb.auth.getSession().then(({ data }) => {
      setUser(data.session?.user ?? null);
      setAuthLoading(false);
    });
    const { data: sub } = sb.auth.onAuthStateChange((_, session) => {
      setUser(session?.user ?? null);
    });
    return () => sub.subscription.unsubscribe();
  }, []);

  const loadData = useCallback(async () => {
    const check = async (table, setter, key) => {
      setDbStatus(prev => ({ ...prev, [key]: { loading: true } }));
      const { data, error } = await sb.from(table).select('*').limit(500);
      if (error) {
        setDbStatus(prev => ({ ...prev, [key]: { loading: false, error: error.message } }));
      } else {
        setter(data || []);
        setDbStatus(prev => ({ ...prev, [key]: { loading: false, count: data?.length ?? 0 } }));
      }
    };
    await Promise.all([
      check('companies', setCompanies, 'companies'),
      check('sites',     setSites,     'sites'),
      check('orders',    setOrders,    'orders'),
    ]);
    setDataLoaded(true);
  }, []);

  useEffect(() => {
    if (user && !dataLoaded) loadData();
  }, [user, dataLoaded, loadData]);

  if (authLoading) {
    return (
      <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center'}}>
        <div className="spinner" />
      </div>
    );
  }

  if (!user) return <Login onLogin={setUser} />;

  const nav = [
    { id:'dashboard',   icon:'🏠', label:'ダッシュボード' },
    { id:'companies',   icon:'🏢', label:'顧客マスタ' },
    { id:'sites',       icon:'📍', label:'現場マスタ' },
    { id:'orders',      icon:'📋', label:'発注一覧' },
    { id:'connection',  icon:'🔌', label:'接続確認' },
  ];

  return (
    <div className="app-root">
      <div className="header">
        <div className="header-logo">Seed <span>Note</span></div>
        <div className="header-badge">E-Li / OrderIn 共通DB</div>
        <div className="header-user" onClick={() => sb.auth.signOut().then(()=>setUser(null))}>
          {user.email} ▸ ログアウト
        </div>
      </div>
      <div className="main-layout">
        <nav className="sidebar">
          <div className="sidebar-section">メニュー</div>
          {nav.map(n => (
            <div
              key={n.id}
              className={`sidebar-item${page===n.id?' active':''}`}
              onClick={() => setPage(n.id)}
            >
              <span className="sidebar-icon">{n.icon}</span>
              {n.label}
            </div>
          ))}
        </nav>
        <main className="content">
          {!dataLoaded ? (
            <div style={{paddingTop:60,textAlign:'center'}}><div className="spinner" /></div>
          ) : page === 'dashboard' ? (
            <Dashboard companies={companies} sites={sites} orders={orders} />
          ) : page === 'companies' ? (
            <CompaniesPage companies={companies} />
          ) : page === 'sites' ? (
            <SitesPage sites={sites} />
          ) : page === 'orders' ? (
            <OrdersPage orders={orders} />
          ) : page === 'connection' ? (
            <ConnectionCheck dbStatus={dbStatus} />
          ) : null}
        </main>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
<script>
(function() {
  try {
    const src = document.getElementById('app-jsx').textContent;
    const compiled = Babel.transform(src, { presets: ['react'] }).code;
    const script = document.createElement('script');
    script.textContent = compiled;
    document.body.appendChild(script);
  } catch(e) {
    document.getElementById('root').innerHTML =
      '<div style="color:red;padding:20px;font-family:monospace;white-space:pre-wrap">' +
      'JSX compile error:\n' + e.message + '</div>';
  }
})();
</script>
</body>
</html>
